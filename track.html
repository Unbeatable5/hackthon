<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Complaint Status</title>
<link rel="stylesheet" href="track.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
        
            <ul class="nav-links">
                <div class="logo">CivicSense</div>
            <a href="index.html">Home</a>

            <!-- <a href="#how-it-works">How It Work</a> -->
              <!-- <a href="track.html">Track Complaints</a> -->
            </ul>
             </nav>
    

<!-- CONTENT -->
<div class="container">
    <h1>Track Complaint Status</h1>

    <div class="search-box">
        <input type="text" id="complaintId" placeholder="Complaint ID">
        <button onclick="checkStatus()">Check</button>
    </div>

    <div id="result" style="display:none;">
        <div class="section-title">Water Issue</div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Complaint ID</th>
                        <th>Status</th>
                        <th>Department</th>
                        <th>Deadline</th>
                        <th>Remaining Days</th>
                        <th>Date</th>
                        <th>Delayed</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="cid"></td>
                        <td id="status"></td>
                        <td>Water Issues</td>
                        <td>20 Aug 2026</td>
                        <td>5</td>
                        <td>11 Aug 2026</td>
                        <td id="delay"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="back-btn">
        <button onclick="goHome()">Back to Home</button>
    </div>
</div>

<script>
function checkStatus() {
    const id = document.getElementById("complaintId").value.trim();

    if (id === "") {
        alert("Please enter Complaint ID");
        return;
    }

    document.getElementById("result").style.display = "block";
    document.getElementById("cid").innerText = id;

    // Demo logic
    const statusEl = document.getElementById("status");
    const delayEl = document.getElementById("delay");

    if (id.endsWith("5")) {
        statusEl.innerHTML = "Pending";
        statusEl.className = "status-pending";
        delayEl.innerText = "No";
    } else {
        statusEl.innerHTML = "Resolved";
        statusEl.className = "status-resolved";
        delayEl.innerText = "No";
    }
}

// function goHome() {
//     alert("Redirect to Home page");
//}
function goHome() {
    window.location.href = "index.html";
}

</script>

</body>
</html>
