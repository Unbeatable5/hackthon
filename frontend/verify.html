<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Verification</title>
  <link rel="stylesheet" href="verify.css">
  <link rel="stylesheet" href="neon-bg.css">
</head>

<body>
  <div class="neon-blur neon-blur-1"></div>
  <div class="neon-blur neon-blur-2"></div>
  <div class="neon-blur neon-blur-3"></div>

  <nav class="navbar">
    <ul class="nav-links">
      <div class="logo">CivicSense</div>
      <a href="index.html">Home</a>
      <a href="track.html">Track Complaints</a>
    </ul>
  </nav>

  <div class="container">
    <h2>Citizen Login / Register</h2>

    <label>Mobile Number or Email Address</label>
    <input id="userInput" class="mobile" type="text" placeholder="e.g. 9876543210 or user@example.com">

    <button id="generateBtn" class="btn green">Generate OTP</button>

    <!-- Loading -->
    <div id="loading" class="hidden loading">Sending OTP...</div>

    <!-- OTP -->
    <div id="otpWrapper" class="otp-wrapper hidden" onclick="focusOTP()">
      <input id="otpInput" type="text" maxlength="6" inputmode="numeric">
      <div class="otp-boxes">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>

    <button id="verifyBtn" class="btn blue hidden">Verify & Login</button>

    <p id="timer" class="hidden"></p>
    <p id="msg"></p>
  </div>

  <script src="api_client.js"></script>
  <script src="verify.js"></script>
</body>

</html>
