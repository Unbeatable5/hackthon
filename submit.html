<!-- Loader Screen -->
<div id="loaderScreen">
<div class="spinner"></div>
<p>Analyzing Complaint with AI...</p>
</div>


<!-- Complaint Card -->
<div class="card" id="formCard">

<h2>Submit a Complaint</h2>

<label>Complaint Title (optional)</label>
<input type="text" id="title" placeholder="e.g. Water Issue">

<label>Complaint Description *</label>
<textarea id="desc" placeholder="Describe your issue..."></textarea>

<button class="continueBtn" onclick="startAI()">Continue</button>


<!-- AI RESULT SECTION -->
<div id="aiSection">

<button class="retryBtn">Retry with AI</button>

<label>Area *</label>
<input type="text" placeholder="e.g. 2-2 Street, Chikodi">

<label>Category</label>
<input type="text" value="Water Supply Issue" disabled>

<label>Priority</label>
<input type="text" value="Medium" disabled>

<button class="submitBtn" onclick="submitComplaint()">Submit Complaint</button>

</div>

</div>

<script src="submit.js"></script>
<div id="successPopup">
✔ Complaint Submitted Successfully
</div>

</body>
</html>
